<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Flashcard</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='foysal/flashcard.2.0/style/header.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='foysal/flashcard.2.0/style/vertical-bar.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='foysal/flashcard.2.0/style/main_content.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='foysal/flashcard.2.0/style/start.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='foysal/flashcard.2.0/style/theme.css') }}">
        <script src="https://cdn.tailwindcss.com"></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="{{ url_for('static', filename='foysal/flashcard.2.0/javasript/start.js') }}" defer></script>

        <style>

        </style>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    </head>
    <body>
        <div class="container">
            <!-- Feature menu on the left side -->
            <div id="feature-menu" class="strip bg-gray-300 min-w-[45px]">
                <a href="{{ url_for('home') }}">
                    <div class="w-full h-[4rem] flex items-center justify-center bg-blue-500">
                        <img src="{{ url_for('static', filename='feature-menu/icons/home.png') }}" alt="web" class="w-[1.5rem] h-[1.5rem]">
                    </div>
                </a> 
                <a href="{{ url_for('serve_page', page='zaeem/todolist/index.html') }}">
                    <div class="w-full h-[4rem] flex items-center justify-center bg-green-500">
                        <img src="{{ url_for('static', filename='feature-menu/icons/todolist.png') }}" alt="todolist" class="w-[1.5rem] h-[1.5rem]">
                    </div>
                </a>   
                <a href="{{ url_for('serve_page', page='zaeem/notes/index.html') }}">
                    <div class="w-full h-[4rem] flex items-center justify-center bg-red-500">
                        <img src="{{ url_for('static', filename='feature-menu/icons/notes.png') }}" alt="notes" class="w-[1.5rem] h-[1.5rem]">
                    </div>
                </a>
                <a href="{{ url_for('serve_page', page='zaeem/habits/index.html') }}">
                    <div class="w-full h-[4rem] flex items-center justify-center bg-yellow-500">
                        <img src="{{ url_for('static', filename='feature-menu/icons/habits.png') }}" alt="habits" class="w-[1.5rem] h-[1.5rem]">
                    </div>
                </a>
                <a href="{{ url_for('serve_page', page='foysal/flashcard.2.0/index.html') }}">
                    <div class="w-full h-[4rem] flex items-center justify-center bg-purple-500">
                        <img src="{{ url_for('static', filename='feature-menu/icons/flashcards.png') }}" alt="flashcards" class="w-[1.5rem] h-[1.5rem]">
                    </div>
                </a>
                <a href="{{ url_for('serve_page', page='calendar/index.html') }}">
                    <div class="w-full h-[4rem] flex items-center justify-center bg-pink-500">
                        <img src="{{ url_for('static', filename='feature-menu/icons/calendar.png') }}" alt="calendar" class="w-[1.5rem] h-[1.5rem]">
                    </div>
                </a>
                <a href="{{ url_for('serve_page', page='foysal/Flip Clock/clock/clock.html') }}">
                    <div class="w-full h-[4rem] flex items-center justify-center bg-orange-500">
                        <img src="{{ url_for('static', filename='feature-menu/icons/clock.png') }}" alt="clock" class="w-[2rem] h-[2rem]">
                    </div>
                </a>
                <a href="{{ url_for('serve_page', page='grades/index.html') }}">
                    <div class="w-full h-[4rem] flex items-center justify-center bg-gray-500">
                        <img src="{{ url_for('static', filename='feature-menu/icons/grades.png') }}" alt="grades" class="w-[2rem] h-[2rem]">
                    </div>
                </a>
            </div>


            <!-- Flashcard container -->
            <div class="flashcard-container">
                <div id="flashcard-menu" class="strip quizlet-menu">
                    <!-- Section: Start Here -->
                    <div class="menu-section">
                        <button class="menu-btn active">
                            <span class="menu-icon">&#8962;</span>
                            <span class="menu-label"><a href="{{ url_for('serve_page', page='foysal/flashcard.2.0/index.html') }}">Home</a></span>
                        </button>
                        <button class="menu-btn">
                            <span class="menu-icon">&#9889;</span>
                            <span class="menu-label"><a href="{{ url_for('serve_page', page='foysal/flashcard.2.0/start.html') }}">Start Here</a></span>
                        </button>
                    </div>
                    <hr class="menu-divider">
                    <!-- Section: Flashcards -->
                    <div class="menu-section">
                        <button class="menu-btn">
                            <span class="menu-icon">&#128218;</span>
                            <span class="menu-label"><a href="{{ url_for('serve_page', page='foysal/flashcard.2.0/Library.html') }}">Library</a></span>
                        </button>
                    </div>
                    <hr class="menu-divider">
                    <!-- Section: Folders -->
                    <div class="menu-section">
                        <button class="menu-btn">
                            <span class="menu-icon">&#128193;</span>
                            <span class="menu-label js-createFolder">New Folder</span>
                        </button>
                        <details class="folder-container">
                            <summary class="summary-row">
                                <div class="folder-addition-container">
                                    <span class="folder-icon fs-6 fw-semibold">📁 Your Folder</span>
                                </div>
                            </summary>
                            <div class="folder-list">
                                <div class="folder-div">
                                    <span class="folder-icon">📁 Business</span>
                                </div>
                                <div class="folder-div">
                                    <span class="folder-icon">📁 Personal</span>
                                </div>
                                <div class="folder-div">
                                    <span class="folder-icon">📁 Study</span>
                                </div>
                            </div>
                        </details>
                    </div>
                    <hr class="menu-divider">
                    <!-- Section: Reminder -->
                    <div class="menu-section">
                        <button class="menu-btn">
                            <span class="menu-icon">&#9201;</span>
                            <span class="menu-label">Reminder</span>
                        </button>
                    </div>
                </div>
            </div>

            <!--Header of the page-->
                <div class="header">
                    <div class="left-section"> 
                        <img class="hamburger-menu" src="{{ url_for('static', filename='foysal/flashcard.2.0/image/hamburger-menu.svg') }}">
                        <img class="youtube-logo" src="{{ url_for('static', filename='foysal/flashcard.2.0/image/icon.webp') }}">
                    </div>
                    <div class="middle-section">
                        <input class="search-bar" type="text" placeholder="Search">
                        <button class="search-button">
                            <img class="search-ion" src="{{ url_for('static', filename='foysal/flashcard.2.0/image/search.svg') }}">
                            <div class="tooltip">Search</div>
                            </button>
                            
                    </div>

                    <div class="right-section"> 
                        <div class="upload-icon-container">
                            <img class="upload-icon" src="{{ url_for('static', filename='foysal/flashcard.2.0/image/blue-add-button-12025.svg') }}">
                            <div class="tooltip">Create</div>
                        </div>
                        
                        <div class="upgrade_button">
                            <button>Upgrade feature</button>
                        </div>
                            <img class="current-user-pictures" src="{{ url_for('static', filename='foysal/flashcard.2.0/image/download.jpeg') }}">
                    </div>
                </div>


            <!-- Main area -->
            <div class="Main-content">
                <div class="showbox start-showbox">
                    <div class="start-hero">
                        <h1>Welcome to the Flashcard App</h1>
                        <p class="lead text-muted">Start creating your flashcards and enhance your learning experience!</p>
                    </div>
                    <!-- Flashcard App -->
                    <div id="flashcard-app" class="card shadow-sm mt-4">
                        <div class="card-body">
                            <h3 class="card-title mb-3 text-primary">Add a Flashcard</h3>
                            <form id="flashcard-form" class="row g-2 align-items-center" autocomplete="off">
                                <div class="col-12 col-md-12 mb-2">
                                    <input type="text" id="set-title" placeholder="Set Title" required class="form-control" maxlength="100">
                                </div>
                                <div id="flashcard-fields" class="w-100">
                                    <div class="row g-2 mb-2 flashcard-row">
                                        <div class="col-12 col-md-5">
                                            <input type="text" class="form-control question-input" placeholder="Question" required maxlength="100">
                                        </div>
                                        <div class="col-12 col-md-5">
                                            <input type="text" class="form-control answer-input" placeholder="Answer" required maxlength="100">
                                        </div>
                                        <div class="col-12 col-md-2 d-grid">
                                            <button type="button" class="btn btn-danger remove-flashcard" title="Remove">&times;</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12 mb-2">
                                    <button type="button" id="add-flashcard" class="btn btn-outline-primary w-100">Add Another Card</button>
                                </div>
                                <div class="col-12 mb-2">
                                    <button type="submit" id="save-set" class="btn btn-success w-100">Save Flashcard Set</button>
                                </div>
                                <div class="col-12 mb-2">
                                    <div id="recent-flashcards" class="mt-2"></div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
    </body>
</html>
